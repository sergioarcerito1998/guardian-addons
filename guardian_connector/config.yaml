name: Guardian Connector
version: "0.8.0"
slug: guardian_connector
image: "ghcr.io/sergioarcerito1998/guardian-connector-{arch}"
description: Local read-only discovery and secure sync agent for Guardian
startup: application
boot: auto
init: false
homeassistant_api: true
arch:
  - amd64
  - aarch64
options:
  interval: 3600
  github_token: ""
  github_repository: "sergioarcerito1998/guardian"
schema:
  interval: int(300,86400)
  github_token: password
  github_repository: str
