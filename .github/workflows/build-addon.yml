name: Build Guardian Connector

on:
  push:
    branches:
      - main
    paths:
      - "guardian_connector/**"
      - ".github/workflows/build-addon.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
          - arch: aarch64
            platform: linux/arm64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read add-on version
        id: addon
        shell: bash
        run: |
          VERSION="$(sed -n 's/^version: *"\(.*\)"/\1/p' guardian_connector/config.yaml)"
          test -n "$VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./guardian_connector
          platforms: ${{ matrix.platform }}
          push: true
          tags: ghcr.io/sergioarcerito1998/guardian-connector-${{ matrix.arch }}:${{ steps.addon.outputs.version }}
          build-args: |
            BUILD_FROM=ghcr.io/home-assistant/${{ matrix.arch }}-base:3.22
          labels: |
            org.opencontainers.image.source=https://github.com/sergioarcerito1998/guardian-addons
            org.opencontainers.image.version=${{ steps.addon.outputs.version }}
